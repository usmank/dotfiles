#===============================================================================
# General
#===============================================================================
# Update terminal emulator title
set -g set-titles on

# Enable vi mode
setw -g mode-keys vi

set -g history-limit 10000

set -g default-terminal "xterm-256color"
#set -g default-terminal "${TERM}"
set -ga terminal-overrides ",xterm-256color:Tc"
set -sa terminal-overrides ",alacritty:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.c
# Number windows and panes from 1
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

set -g focus-events on
set -g monitor-bell off

#===============================================================================
# Mouse Support
#===============================================================================
set -g mouse on

#===============================================================================
# Customizations
#===============================================================================
# Message command and mode style
set -g message-style bg=default,fg=default
set -g message-command-style bg=default,fg=default,reverse
set -g mode-style bg=default,fg=default,reverse
set -g copy-mode-match-style bg=colour12
set -g copy-mode-current-match-style reverse

# Status bar style
set -g status-justify left
set -g status-style bg=default,fg=default,none
set -g status-interval 1

# Windows list formatting
set -g status-style bg=default
set -g window-status-style 'bg=colour12,fg=default,list=focus,none'
set -g window-status-format '#[bg=colour8,fg=colour7] #I #[bg=default,fg=default] #W #F '
set -g window-status-current-style 'bg=colour14,fg=default,list=focus'
set -g window-status-current-format '#[bg=colour4,fg=colour12,bold] #I #[bg=colour12,fg=colour4] #W #F '
set -g window-status-activity-style bg=default,fg=colour6,blink
set -g window-status-bell-style bg=default,fg=colour6,blink
set -g window-status-separator ''

# Left status formatting
#set -g status-left-style bg=colour250,fg=default,bold
#set -g status-left ' #{client_session} #[bg=colour254,fg=default,none] #(~/code/info-scripts/ssh-info.sh #{pane_tty}) '
set -g status-left ''
set -g status-left-length 0

# Right status formatting
set -g status-right-style 'bg=colour12,fg=default,none'
set -g status-right '\
#[bg=colour8,fg=colour7] 󰟀 #[bg=default,fg=default] #(bash ~/code/info-scripts/ssh-info.sh #{pane_tty}) \
#[bg=colour8,fg=colour7] 󰯌 #[bg=default,fg=default] #{session_name} \
#[bg=colour8,fg=colour7] 󱐋 #[bg=default,fg=default] #(bash ~/code/info-scripts/power-info.sh #{pane_tty}) \
#[bg=colour8,fg=colour7] 󰃰 #[bg=default,fg=default] %a %b %d %H:%M '
set -g status-right-length 80

# Pane border status
set -g pane-border-style fg=default
set -g pane-active-border-style fg=default
set -g pane-border-status off
set -g pane-border-format ' #P '

# Pane number display
set -g display-panes-colour colour7
set -g display-panes-active-colour colour4

# Clock colour
set -g clock-mode-colour colour0

#===============================================================================
# Keybinds
#===============================================================================
# Change prefix to Ctrl-a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Reload config file
unbind r
bind r source-file ~/.tmux.conf

# Display pane numbers on Ctrl-a + Ctrl-a
bind C-a display-panes

# Reduce delay after pressing escape
set -sg escape-time 0

# Switch to next session
bind k switch-client -n

# Move windows left/right
bind -n C-S-Left swap-window -t -1\; select-window -t -1
bind -n C-S-Right swap-window -t +1\; select-window -t +1

# Split panes switch to current directory
bind '"' split-window -v -c '#{pane_current_path}'
bind % split-window -h -c '#{pane_current_path}'

# Swtich to next session
bind k switch-client -n

#===============================================================================
# Smart pane switching with awareness of vim splits
#===============================================================================
# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

