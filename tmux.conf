# -----------------------------------------------------------------------------
# Status bar
# -----------------------------------------------------------------------------
# Message command and mode style
set -g message-style bg=default,fg=default
set -g message-command-style bg=default,fg=default,reverse
set -g mode-style bg=default,fg=default,reverse
set -g copy-mode-match-style bg=default,fg=default,reverse
set -g copy-mode-current-match-style bg=default,fg=default,reverse
set -g copy-mode-selection-style bg=${yellow},fg=${base}
set -g prompt-cursor-colour default
set -g prompt-cursor-style default

# Window theming
# Can be used to dim inactive panes, but requires nvim themes normal highlight
# to be empty for it to work with nvim.
# set -g window-active-style bg=default
# set -g window-style bg=default

# Status bar style
set -g status-position bottom
set -g status-justify left
set -g status-style bg=default,fg=default,none
set -g status-interval 1

# Windows list formatting
set -g status-style bg=default
set -g window-status-style 'bg=default,fg=default,list=focus,none'
set -g window-status-format ' #[bg=#{surface2},fg=default] #(~/code/info-scripts/map-numbers.sh #I #F) #[bg=#{surface0},none] #W #[bg=default]'
set -g window-status-current-style 'bg=default,fg=#{subtext0},list=focus'
set -g window-status-current-format ' #[bg=#{subtext0},fg=#{base},bold] #(~/code/info-scripts/map-numbers.sh #I #F) #[bg=#{surface0},fg=#{text}] #W #[bg=default]'
set -g window-status-activity-style bg=default,fg=colour6,blink
set -g window-status-bell-style bg=default,fg=colour6,blink
set -g window-status-separator ''

# Left status formatting
#set -g status-left-style bg=colour250,fg=default,bold
#set -g status-left ' #{client_session} #[bg=colour254,fg=default,none] #(~/code/info-scripts/ssh-info.sh #{pane_tty}) '
set -g status-left ''
set -g status-left-length 80

# Right status formatting
#set -g status-right-style 'bg=colour254,fg=default,none'
set -g status-right-style 'bg=default,fg=default,none'
set -g status-right '\
 #[fg=default,bg=#{surface2}] 󰟀 #[bg=#{surface0},none] #(bash ~/code/info-scripts/ssh-info.sh #{pane_tty}) #[bg=default]\
 #[fg=default,bg=#{surface2}] 󰯌 #[bg=#{surface0},none] #{session_name} #[bg=default]\
 #[fg=default,bg=#{surface2}] 󱐋 #[bg=#{surface0},none] #(bash ~/code/info-scripts/power-info.sh #{pane_tty}) #[bg=default]\
 #[fg=default,bg=#{surface2}] 󰃰 #[bg=#{surface0},none] %a %b %d %H:%M #[bg=default]'
set -g status-right-length 80

# -----------------------------------------------------------------------------
# Other Appearance Related Configurations
# -----------------------------------------------------------------------------
# Pane border status
set -g pane-border-style fg=${mantle}
set -g pane-active-border-style fg=${surface0}
set -g pane-border-status off
set -g pane-border-format ' #P '
set -g pane-border-indicators off

# Pane number display
set -g display-panes-colour colour7
set -g display-panes-active-colour ${yellow}

# Clock colour
set -g clock-mode-colour ${yellow}

set -g popup-border-lines rounded

# -----------------------------------------------------------------------------
# Keybinds
# -----------------------------------------------------------------------------
# Change prefix to Ctrl-a
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# Reload config file
unbind r
bind-key r source-file ~/.tmux.conf

# Display pane numbers on Ctrl-a + Ctrl-a
bind-key C-a display-panes

# Reduce delay after pressing escape
set -sg escape-time 0

# Switch to next session
bind-key k switch-client -n

# Move windows left/right
bind-key -n C-S-Left swap-window -t -1\; select-window -t -1
bind-key -n C-S-Right swap-window -t +1\; select-window -t +1

# Split panes switch to current directory
bind-key '"' split-window -v -c '#{pane_current_path}'
bind-key % split-window -h -c '#{pane_current_path}'

# Swtich to next session
bind-key k switch-client -l

# Window navigation
bind-key -n 'M-]' next-window
bind-key -n 'M-[' previous-window

# Pane navigation
bind-key -n 'M-h' select-pane -L
bind-key -n 'M-j' select-pane -D
bind-key -n 'M-k' select-pane -U
bind-key -n 'M-l' select-pane -R

bind-key 'C-h' select-pane -L
bind-key 'C-j' select-pane -D
bind-key 'C-k' select-pane -U
bind-key 'C-l' select-pane -R

unbind-key 'space'
bind-key 'C-Space' next-layout

# --- Pop-up windows ---
# Show tmux messages
bind-key '~' display-popup \
    -T " Tmux Messages " \
    -w 80% \
    -h 80% \
    -E 'tmux show-messages | nvim -R '

